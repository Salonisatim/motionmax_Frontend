<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password | MotionMax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
 <link rel="stylesheet" href="ForgotPassword.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card" id="mainCard">
        <div class="header">
            <div class="icon-box" id="headerIcon">
                <i class="fas fa-lock"></i>
            </div>
            <h1 id="headerTitle">Reset Password</h1>
            <p id="headerDesc">Please enter your registered email address.</p>
        </div>

        <div id="stageEmail" class="form-section active">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-box">
                    <i class="fas fa-envelope field-icon"></i>
                    <input type="email" id="emailInput" placeholder="name@company.com">
                </div>
                <p id="emailError" class="status-msg error">Unauthorized email address.</p>
            </div>
            <button class="btn-submit" onclick="handleEmailSubmit()" id="btnEmail">
                <span>Continue</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div id="stageOTP" class="form-section">
            <p id="timerDisplay" class="timer-text">00:30</p>
            <div class="otp-wrap">
                <input type="text" maxlength="1" class="otp-input" pattern="\d*">
                <input type="text" maxlength="1" class="otp-input" pattern="\d*">
                <input type="text" maxlength="1" class="otp-input" pattern="\d*">
                <input type="text" maxlength="1" class="otp-input" pattern="\d*">
            </div>
            <p id="otpError" class="status-msg error"></p>
            <button class="btn-submit" onclick="handleOTPSubmit()" id="btnOTP">
                <span>Verify Identity</span>
            </button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.8rem; color: var(--text-sub);">
                Didn't receive a code? <a href="#" onclick="resendOTP()" id="resendBtn" style="color: var(--primary); font-weight: 700; text-decoration: none;">Resend</a>
            </p>
        </div>

        <div id="stageNewPass" class="form-section">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-box">
                    <i class="fas fa-key field-icon"></i>
                    <input type="password" id="newPass" placeholder="Min. 8 characters">
                    <i class="fas fa-eye toggle-pass" onclick="toggleVisibility('newPass', this)"></i>
                </div>
                <div class="strength-meter">
                <div id="strengthBar" class="strength-bar">
                    
                </div>
            </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-box">
                    <i class="fas fa-shield-alt field-icon"></i>
                    <input type="password" id="confirmPass" placeholder="Repeat password">
                    <i class="fas fa-eye toggle-pass" onclick="toggleVisibility('confirmPass', this)"></i>
                </div>
                <p id="matchError" class="status-msg error">Passwords do not match.</p>
            </div>
            <button class="btn-submit" onclick="handleFinalReset()" id="btnFinal">
                <span>Reset Password</span>
            </button>
        </div>

        <div id="stageSuccess" class="success-state">
            <div class="header" style="margin-bottom: 0;">
                <div class="icon-box" style="background: rgba(34, 197, 94, 0.1); color: var(--success);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>All Set!</h1>
                <p>Your password has been successfully updated.</p>
            </div>
            <button class="btn-submit" onclick="window.location.reload()" style="margin-top: 30px;">
                Go to Dashboard
            </button>
        </div>

        <a href="Login.html" class="back-to-login" id="backLink" onclick="location.reload()">
            <i class="fas fa-chevron-left"></i> Back to Login
        </a>
    </div>
</div>

<script src="ForgotPassword.js"></script>
</body>
</html>
